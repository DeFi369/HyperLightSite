<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | HyperLightTech</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --paper:#211C18; --card:#2A231D;
      --ink:#F4EEE6; --ink-2:#C3B7A6; --ink-3:#8C8175;
      --line:rgba(244,238,230,.11); --accent:#F0633F; --accent-deep:#E2553D;
      --fh:'Syne',sans-serif; --fb:'Manrope',sans-serif;
    }
    html,body{height:100%}
    body{background:var(--paper);color:var(--ink);font-family:var(--fb);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    a{color:inherit}

    header{background:rgba(33,28,24,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    nav{max-width:760px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:11px;text-decoration:none;font-family:var(--fh);font-weight:800;font-size:18px}
    .logo .mark{width:30px;height:30px;border-radius:8px;background:var(--ink);display:grid;place-items:center;color:var(--paper)}
    .logo .mark svg{width:16px;height:16px}
    .nav-cta{display:inline-flex;align-items:center;background:var(--accent);color:var(--paper);padding:11px 18px;
      border-radius:6px;border:1px solid #D14C2E;font-weight:700;font-size:12px;letter-spacing:.11em;text-transform:uppercase;
      line-height:1;text-decoration:none;box-shadow:0 4px 0 0 #A23A1E;
      transition:transform .12s ease,box-shadow .12s ease,background .2s}
    .nav-cta:hover{background:var(--accent-deep);transform:translateY(-1px);box-shadow:0 5px 0 0 #A23A1E}
    .nav-cta:active{transform:translateY(4px);box-shadow:0 0 0 0 #A23A1E}

    main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      padding:48px 24px;position:relative;overflow:hidden}
    .grid{position:absolute;inset:0;
      background-image:linear-gradient(rgba(240,99,63,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(240,99,63,.05) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 100%);
      -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 100%)}
    .content{position:relative;z-index:2;max-width:580px}
    .big{font-family:var(--fh);font-weight:800;font-size:clamp(96px,18vw,170px);line-height:1;letter-spacing:-6px;
      color:var(--accent);opacity:.2;margin-bottom:-18px;user-select:none}
    h1{font-family:var(--fh);font-weight:800;font-size:clamp(28px,5vw,42px);letter-spacing:-.02em;margin-bottom:14px}
    .sub{font-size:17px;color:var(--ink-2);line-height:1.7;margin-bottom:40px}

    .links{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:34px;text-align:left}
    .lc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;text-decoration:none;
      transition:border-color .2s,transform .2s}
    .lc:hover{border-color:rgba(240,99,63,.4);transform:translateY(-2px)}
    .lc .l{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .lc .t{font-family:var(--fh);font-weight:700;font-size:16px;color:var(--ink)}

    .home{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--accent);color:var(--paper);
      font-family:var(--fb);font-weight:700;font-size:13px;letter-spacing:.11em;text-transform:uppercase;line-height:1;
      padding:16px 24px;border-radius:6px;border:1px solid #D14C2E;text-decoration:none;white-space:nowrap;
      box-shadow:0 4px 0 0 #A23A1E,0 16px 26px -14px rgba(0,0,0,.5);
      transition:transform .12s ease,box-shadow .12s ease,background .2s}
    .home:hover{background:var(--accent-deep);transform:translateY(-1px);box-shadow:0 5px 0 0 #A23A1E,0 20px 30px -14px rgba(0,0,0,.55)}
    .home:active{transform:translateY(4px);box-shadow:0 0 0 0 #A23A1E,0 2px 6px -2px rgba(0,0,0,.4)}
    .home:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
    .home svg{width:15px;height:15px}

    footer{background:#17120E;border-top:1px solid var(--line);padding:24px;text-align:center;font-size:14px;color:var(--ink-3)}
    footer a{color:var(--accent);text-decoration:none}

    @media(max-width:480px){.links{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"><path d="M13 3 4 14h7l-1 7 9-11h-7z" fill="currentColor" stroke="none"/></svg></span>
      HyperLightTech
    </a>
    <a href="/#guides" class="nav-cta">Browse the guides</a>
  </nav>
</header>

<main>
  <div class="grid"></div>
  <div class="content">
    <div class="big">404</div>
    <h1>Page not found.</h1>
    <p class="sub">The page you're after doesn't exist or was moved. Here's where most people are actually headed.</p>

    <div class="links">
      <a href="/#guides" class="lc">
        <div class="l">$9 each</div>
        <div class="t">The guides</div>
      </a>
      <a href="/#flagship" class="lc">
        <div class="l">Go pro · $39</div>
        <div class="t">The Flagship</div>
      </a>
      <a href="/#build" class="lc">
        <div class="l">We build it</div>
        <div class="t">Custom builds</div>
      </a>
      <a href="/#faq" class="lc">
        <div class="l">Questions</div>
        <div class="t">FAQ</div>
      </a>
    </div>

    <a href="/" class="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Back to home
    </a>
  </div>
</main>

<footer>
  © 2026 HyperLightTech — <a href="/">hyperlighttech.com</a>
</footer>

</body>
</html>
